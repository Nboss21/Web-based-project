version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-cms-backend
    ports:
      - "8000:8000"
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-postgresql://user:password@localhost/campus_cms}
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - ./backend:/var/www/html
      - ./backend/uploads:/var/www/html/uploads
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/login.php"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: node:18-alpine
    container_name: campus-cms-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run dev"
    networks:
      - campus-network
    depends_on:
      - backend

networks:
  campus-network:
    driver: bridge
