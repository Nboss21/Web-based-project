<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Maintenance System</title>
    <meta name="description" content="Manage campus facility maintenance requests, tasks, and inventory.">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="./src/css/base.css">
    <link rel="stylesheet" href="./src/css/layout.css">
    <link rel="stylesheet" href="./src/css/components.css">
</head>
<body>
    <div id="app-container" class="app-layout">
        <!-- Sidebar Navigation (Injected dynamically) -->
        <aside id="sidebar" class="sidebar hidden"></aside>
        
        <div class="main-content-wrapper">
            <!-- Top Header (Injected dynamically) -->
            <header id="header" class="header hidden"></header>
            
            <!-- Main Content Area -->
            <main id="app-root" class="main-content">
                <!-- Route content goes here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading application...</p>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- Modal Container -->
    <div id="modal-container" class="modal-container"></div>

    <!-- Application Entry Point -->
    <script type="module" src="./src/js/app.js"></script>
</body>
</html>
